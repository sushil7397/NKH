name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Intentionally NOT caching npm — the lockfile in this repo has had
          # stale/broken version pins in the past. We let npm resolve fresh
          # from package.json each run.

      - name: Remove any committed lockfile
        # The committed package-lock.json has repeatedly been written with
        # version pins that do not exist on the public npm registry
        # (e.g. tailwindcss@3.4.59, postcss-js@4.5.0, debug@4.5.0). We delete
        # it here so npm resolves every dependency fresh from package.json
        # against the public registry. This makes CI fully independent of
        # whatever lockfile happens to be in the repo.
        run: rm -f package-lock.json npm-shrinkwrap.json yarn.lock pnpm-lock.yaml

      - name: Install dependencies
        # `npm install --no-package-lock` further guarantees npm will not read
        # any lockfile during resolution and will not write one back either.
        run: npm install --no-package-lock --no-audit --no-fund --registry=https://registry.npmjs.org/

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
